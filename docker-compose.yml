services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: swarm-rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swarm-net

  redis:
    image: redis:7-alpine
    container_name: swarm-redis
    hostname: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swarm-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: swarm-qdrant
    hostname: qdrant
    ports:
      - "6333:6333" # REST
      - "6334:6334" # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - swarm-net

  gateway:
    build: ./gateway
    container_name: swarm-gateway
    hostname: gateway
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - swarm-net

  planner:
    build:
      context: .
      dockerfile: planner/Dockerfile
    container_name: swarm-planner
    hostname: planner
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-2.0-flash
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    env_file:
      - path: .env
        required: false
    ports:
      - "8001:8001"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - swarm-net

  workers:
    build:
      context: .
      dockerfile: workers/Dockerfile
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-2.0-flash
      GEMINI_EMBED_MODEL: models/gemini-embedding-001
    env_file:
      - path: .env
        required: false
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - swarm-net
    restart: unless-stopped

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        # Baked into the client bundle at build time — must be reachable from
        # the browser (host machine), not Docker-internal service names.
        NEXT_PUBLIC_GATEWAY_URL: http://localhost:8000
        NEXT_PUBLIC_PLANNER_URL: http://localhost:8001
    container_name: swarm-ui
    hostname: ui
    ports:
      - "3000:3000"
    depends_on:
      - gateway
      - planner
    networks:
      - swarm-net

networks:
  swarm-net:
    driver: bridge

volumes:
  qdrant-data:
